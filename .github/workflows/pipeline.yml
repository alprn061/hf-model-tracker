name: Run HF Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          user: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          dbname: ${{ secrets.DBNAME }}
          pool_mode: ${{ secrets.POOL_MODE }}
        run: |
          echo "🔄 Running HF pipeline..."
          python -m pipeline.run_pipeline || exit 1
